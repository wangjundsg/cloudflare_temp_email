name: D1 Cleanup Tommy Random Addresses

on:
  workflow_dispatch:
    inputs:
      days:
        description: "Only match addresses created in the last N days"
        required: true
        default: "7"
      confirm:
        description: "Set to true to delete. false only prints counts and samples."
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: pnpm/action-setup@v5
        name: Install pnpm
        with:
          version: 10
          run_install: false

      - name: Inspect matching addresses
        working-directory: worker
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          WRANGLER_TOML_CONTENT: ${{ secrets.BACKEND_TOML }}
          DAYS: ${{ github.event.inputs.days }}
        run: |
          printf '%s\n' "$WRANGLER_TOML_CONTENT" > wrangler.toml
          pnpm install --no-frozen-lockfile
          cat > /tmp/inspect.sql <<'SQL'
          SELECT COUNT(*) AS count
          FROM address
          WHERE name LIKE 'tommy%@%'
            AND substr(name, 6, instr(name, '@') - 6) GLOB '*[a-z]*'
            AND created_at >= datetime('now', '-' || ?1 || ' day');

          SELECT date(created_at) AS day, COUNT(*) AS count
          FROM address
          WHERE name LIKE 'tommy%@%'
            AND substr(name, 6, instr(name, '@') - 6) GLOB '*[a-z]*'
            AND created_at >= datetime('now', '-' || ?1 || ' day')
          GROUP BY date(created_at)
          ORDER BY day DESC;

          SELECT id, name, created_at, updated_at
          FROM address
          WHERE name LIKE 'tommy%@%'
            AND substr(name, 6, instr(name, '@') - 6) GLOB '*[a-z]*'
            AND created_at >= datetime('now', '-' || ?1 || ' day')
          ORDER BY id DESC
          LIMIT 30;
          SQL
          sed "s/?1/${DAYS}/g" /tmp/inspect.sql > /tmp/inspect.final.sql
          pnpm wrangler d1 execute cloudflare-temp-email --remote --file /tmp/inspect.final.sql

      - name: Delete matching addresses
        if: ${{ github.event.inputs.confirm == 'true' }}
        working-directory: worker
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          WRANGLER_TOML_CONTENT: ${{ secrets.BACKEND_TOML }}
          DAYS: ${{ github.event.inputs.days }}
        run: |
          printf '%s\n' "$WRANGLER_TOML_CONTENT" > wrangler.toml
          cat > /tmp/delete.sql <<'SQL'
          DELETE FROM raw_mails
          WHERE address IN (
            SELECT name FROM address
            WHERE name LIKE 'tommy%@%'
              AND substr(name, 6, instr(name, '@') - 6) GLOB '*[a-z]*'
              AND created_at >= datetime('now', '-' || ?1 || ' day')
          );

          DELETE FROM sendbox
          WHERE address IN (
            SELECT name FROM address
            WHERE name LIKE 'tommy%@%'
              AND substr(name, 6, instr(name, '@') - 6) GLOB '*[a-z]*'
              AND created_at >= datetime('now', '-' || ?1 || ' day')
          );

          DELETE FROM auto_reply_mails
          WHERE address IN (
            SELECT name FROM address
            WHERE name LIKE 'tommy%@%'
              AND substr(name, 6, instr(name, '@') - 6) GLOB '*[a-z]*'
              AND created_at >= datetime('now', '-' || ?1 || ' day')
          );

          DELETE FROM address_sender
          WHERE address IN (
            SELECT name FROM address
            WHERE name LIKE 'tommy%@%'
              AND substr(name, 6, instr(name, '@') - 6) GLOB '*[a-z]*'
              AND created_at >= datetime('now', '-' || ?1 || ' day')
          );

          DELETE FROM users_address
          WHERE address_id IN (
            SELECT id FROM address
            WHERE name LIKE 'tommy%@%'
              AND substr(name, 6, instr(name, '@') - 6) GLOB '*[a-z]*'
              AND created_at >= datetime('now', '-' || ?1 || ' day')
          );

          DELETE FROM address
          WHERE name LIKE 'tommy%@%'
            AND substr(name, 6, instr(name, '@') - 6) GLOB '*[a-z]*'
            AND created_at >= datetime('now', '-' || ?1 || ' day');
          SQL
          sed "s/?1/${DAYS}/g" /tmp/delete.sql > /tmp/delete.final.sql
          pnpm wrangler d1 execute cloudflare-temp-email --remote --file /tmp/delete.final.sql

      - name: Verify remaining matches
        if: ${{ github.event.inputs.confirm == 'true' }}
        working-directory: worker
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          WRANGLER_TOML_CONTENT: ${{ secrets.BACKEND_TOML }}
          DAYS: ${{ github.event.inputs.days }}
        run: |
          printf '%s\n' "$WRANGLER_TOML_CONTENT" > wrangler.toml
          cat > /tmp/verify.sql <<'SQL'
          SELECT COUNT(*) AS remaining
          FROM address
          WHERE name LIKE 'tommy%@%'
            AND substr(name, 6, instr(name, '@') - 6) GLOB '*[a-z]*'
            AND created_at >= datetime('now', '-' || ?1 || ' day');
          SQL
          sed "s/?1/${DAYS}/g" /tmp/verify.sql > /tmp/verify.final.sql
          pnpm wrangler d1 execute cloudflare-temp-email --remote --file /tmp/verify.final.sql
