name: D1 Cleanup Tommy Random Addresses

on:
  workflow_dispatch:
    inputs:
      days:
        description: "Only match addresses created in the last N days"
        required: true
        default: "7"
      confirm:
        description: "Set to true to delete. false only prints counts and samples."
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: pnpm/action-setup@v5
        name: Install pnpm
        with:
          version: 10
          run_install: false

      - name: Inspect matching addresses
        working-directory: worker
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          WRANGLER_TOML_CONTENT: ${{ secrets.BACKEND_TOML }}
          DAYS: ${{ github.event.inputs.days }}
        run: |
          if ! [[ "$DAYS" =~ ^[0-9]+$ ]]; then
            echo "days must be a positive integer"
            exit 1
          fi
          printf '%s\n' "$WRANGLER_TOML_CONTENT" > wrangler.toml
          pnpm install --no-frozen-lockfile
          MATCH_CONDITION="name LIKE 'tommy%@%' AND substr(name, 6, instr(name, '@') - 6) GLOB '*[a-z]*' AND created_at >= datetime('now', '-${DAYS} day')"

          echo "=== Matching count ==="
          pnpm wrangler d1 execute cloudflare-temp-email --remote --command "SELECT COUNT(*) AS count FROM address WHERE ${MATCH_CONDITION};"

          echo "=== Matching count by day ==="
          pnpm wrangler d1 execute cloudflare-temp-email --remote --command "SELECT date(created_at) AS day, COUNT(*) AS count FROM address WHERE ${MATCH_CONDITION} GROUP BY date(created_at) ORDER BY day DESC;"

          echo "=== Latest 30 samples ==="
          pnpm wrangler d1 execute cloudflare-temp-email --remote --command "SELECT id, name, created_at, updated_at FROM address WHERE ${MATCH_CONDITION} ORDER BY id DESC LIMIT 30;"

      - name: Delete matching addresses
        if: ${{ github.event.inputs.confirm == 'true' }}
        working-directory: worker
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          WRANGLER_TOML_CONTENT: ${{ secrets.BACKEND_TOML }}
          DAYS: ${{ github.event.inputs.days }}
        run: |
          if ! [[ "$DAYS" =~ ^[0-9]+$ ]]; then
            echo "days must be a positive integer"
            exit 1
          fi
          printf '%s\n' "$WRANGLER_TOML_CONTENT" > wrangler.toml
          MATCH_CONDITION="name LIKE 'tommy%@%' AND substr(name, 6, instr(name, '@') - 6) GLOB '*[a-z]*' AND created_at >= datetime('now', '-${DAYS} day')"
          MATCH_NAMES="SELECT name FROM address WHERE ${MATCH_CONDITION}"
          MATCH_IDS="SELECT id FROM address WHERE ${MATCH_CONDITION}"

          pnpm wrangler d1 execute cloudflare-temp-email --remote --command "DELETE FROM raw_mails WHERE address IN (${MATCH_NAMES});"
          pnpm wrangler d1 execute cloudflare-temp-email --remote --command "DELETE FROM sendbox WHERE address IN (${MATCH_NAMES});"
          pnpm wrangler d1 execute cloudflare-temp-email --remote --command "DELETE FROM auto_reply_mails WHERE address IN (${MATCH_NAMES});"
          pnpm wrangler d1 execute cloudflare-temp-email --remote --command "DELETE FROM address_sender WHERE address IN (${MATCH_NAMES});"
          pnpm wrangler d1 execute cloudflare-temp-email --remote --command "DELETE FROM users_address WHERE address_id IN (${MATCH_IDS});"
          pnpm wrangler d1 execute cloudflare-temp-email --remote --command "DELETE FROM address WHERE ${MATCH_CONDITION};"

      - name: Verify remaining matches
        if: ${{ github.event.inputs.confirm == 'true' }}
        working-directory: worker
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          WRANGLER_TOML_CONTENT: ${{ secrets.BACKEND_TOML }}
          DAYS: ${{ github.event.inputs.days }}
        run: |
          if ! [[ "$DAYS" =~ ^[0-9]+$ ]]; then
            echo "days must be a positive integer"
            exit 1
          fi
          printf '%s\n' "$WRANGLER_TOML_CONTENT" > wrangler.toml
          MATCH_CONDITION="name LIKE 'tommy%@%' AND substr(name, 6, instr(name, '@') - 6) GLOB '*[a-z]*' AND created_at >= datetime('now', '-${DAYS} day')"
          pnpm wrangler d1 execute cloudflare-temp-email --remote --command "SELECT COUNT(*) AS remaining FROM address WHERE ${MATCH_CONDITION};"
